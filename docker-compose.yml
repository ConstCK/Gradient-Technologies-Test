services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: gradient
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@postgres:5432/gradient
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy

  tests:
    build: .
    command: pytest tests/ -v
    environment:
      # conftest подставляет sqlite in-memory до импорта app — postgres не нужен
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
